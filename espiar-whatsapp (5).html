<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ESPIAR WHATSAPP</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Share Tech Mono', monospace;
            background: #000;
            color: #0f0;
            overflow-x: hidden;
            min-height: 100vh;
            position: relative;
        }

        /* Matrix Rain Effect */
        #matrix-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            opacity: 0.25;
        }

        .container {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            margin-bottom: 60px;
            text-shadow: 
                0 0 20px #0f0,
                0 0 40px #0f0,
                0 0 60px #0f0,
                0 0 80px #0f0,
                0 0 100px #0f0;
            animation: glitch 2s infinite;
            letter-spacing: 8px;
            position: relative;
            z-index: 2;
            background: rgba(0, 0, 0, 0.7);
            padding: 20px 40px;
            border-radius: 10px;
        }

        @keyframes glitch {
            0%, 90%, 100% {
                text-shadow: 
                    0 0 10px #0f0,
                    0 0 20px #0f0,
                    0 0 30px #0f0;
            }
            92% {
                text-shadow: 
                    -2px 0 10px #f00,
                    2px 2px 20px #0ff;
                transform: translate(-2px, 2px);
            }
            94% {
                text-shadow: 
                    2px 0 10px #0ff,
                    -2px -2px 20px #f00;
                transform: translate(2px, -2px);
            }
        }

        .form-container {
            background: rgba(0, 20, 0, 0.85);
            border: 2px solid #0f0;
            border-radius: 10px;
            padding: 50px 60px;
            box-shadow: 
                0 0 20px rgba(0, 255, 0, 0.3),
                inset 0 0 20px rgba(0, 255, 0, 0.1);
            min-width: 450px;
            backdrop-filter: blur(10px);
        }

        .input-group {
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #0f0;
        }

        .phone-input-wrapper {
            display: flex;
            gap: 10px;
        }

        select, input {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid #0f0;
            color: #0f0;
            padding: 15px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 1rem;
            border-radius: 5px;
            outline: none;
            transition: all 0.3s ease;
        }

        select {
            flex: 0 0 140px;
            cursor: pointer;
        }

        input {
            flex: 1;
        }

        select:focus, input:focus {
            border-color: #0ff;
            box-shadow: 
                0 0 10px rgba(0, 255, 255, 0.5),
                inset 0 0 5px rgba(0, 255, 255, 0.2);
        }

        select option {
            background: #001a00;
            color: #0f0;
            padding: 10px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #003300, #006600);
            border: 2px solid #0f0;
            color: #0f0;
            padding: 18px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 20px rgba(0, 255, 0, 0.3);
        }

        button:hover {
            background: linear-gradient(135deg, #006600, #009900);
            box-shadow: 
                0 0 30px rgba(0, 255, 0, 0.6),
                inset 0 0 20px rgba(0, 255, 0, 0.2);
            transform: translateY(-2px);
        }

        button:active {
            transform: translateY(0);
        }

        .info-text {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            opacity: 0.7;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Scrollbar estilo Matrix */
        ::-webkit-scrollbar {
            width: 10px;
        }

        ::-webkit-scrollbar-track {
            background: #000;
        }

        ::-webkit-scrollbar-thumb {
            background: #0f0;
            border-radius: 5px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #0ff;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 2.5rem;
                letter-spacing: 4px;
            }

            .form-container {
                min-width: auto;
                width: 100%;
                padding: 30px 25px;
            }

            .phone-input-wrapper {
                flex-direction: column;
            }

            select {
                flex: 1;
            }
        }

        /* Terminal Styles */
        .terminal-overlay {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 700px;
            height: 500px;
            z-index: 1000;
            display: none;
            animation: slideIn 0.5s ease-out;
        }

        .terminal-overlay.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .terminal {
            background: #000;
            border: 2px solid #0f0;
            border-radius: 10px;
            width: 100%;
            height: 100%;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0, 255, 0, 0.5);
            display: flex;
            flex-direction: column;
        }

        .terminal-header {
            background: #003300;
            padding: 10px 20px;
            border-bottom: 1px solid #0f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        .terminal-button {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            display: inline-block;
        }

        .terminal-button.red { 
            background: #ff5f56;
            cursor: pointer;
        }
        
        .terminal-button.red:hover {
            box-shadow: 0 0 10px #ff5f56;
        }

        .terminal-button.yellow { background: #ffbd2e; }
        .terminal-button.green { background: #27c93f; }

        .terminal-title {
            color: #0f0;
            font-size: 0.85rem;
            margin-left: 10px;
            flex-grow: 1;
        }

        .terminal-body {
            padding: 15px;
            flex: 1;
            overflow-y: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.75rem;
            line-height: 1.4;
        }

        .terminal-line {
            color: #0f0;
            margin: 3px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .terminal-line.error {
            color: #ff0000;
        }

        .terminal-line.warning {
            color: #ffff00;
        }

        .terminal-line.success {
            color: #00ff00;
        }

        .terminal-line.info {
            color: #00ffff;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

        .cursor {
            display: inline-block;
            width: 8px;
            height: 16px;
            background: #0f0;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }

        .countdown-container {
            background: rgba(0, 50, 0, 0.8);
            border: 2px solid #0f0;
            padding: 20px;
            margin-top: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .countdown-title {
            font-size: 0.9rem;
            color: #ffff00;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .countdown-timer {
            font-size: 2rem;
            color: #0f0;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 20px #0f0;
            font-weight: 900;
        }

        .progress-bar-container {
            width: 100%;
            height: 15px;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid #0f0;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #0f0, #0ff);
            width: 0%;
            transition: width 1s linear;
            box-shadow: 0 0 10px #0f0;
        }

        .target-info {
            background: rgba(0, 50, 0, 0.6);
            border: 1px solid #0f0;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            font-size: 0.7rem;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            padding: 3px;
        }

        .info-label {
            color: #ffff00;
            font-weight: bold;
        }

        .info-value {
            color: #0f0;
        }

        @media (max-width: 768px) {
            .terminal-overlay {
                bottom: 10px;
                right: 10px;
                left: 10px;
                width: auto;
                height: 400px;
            }
        }

        /* WhatsApp Loading Screen */
        .whatsapp-loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #111b21;
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }

        .whatsapp-loading.active {
            display: flex;
        }

        .whatsapp-icon {
            width: 80px;
            height: 80px;
            margin-bottom: 30px;
            opacity: 0.6;
        }

        .whatsapp-icon svg {
            width: 100%;
            height: 100%;
            fill: #54656f;
        }

        .loading-text {
            color: #8696a0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 18px;
            margin-bottom: 15px;
            letter-spacing: 0.5px;
        }

        .attack-status {
            color: #00a884;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            margin-top: 20px;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .loading-bar-wrapper {
            width: 400px;
            height: 3px;
            background: #2a3942;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 40px;
        }

        .progress-bar-fill {
            height: 100%;
            background: #00a884;
            width: 0%;
            transition: width 1s linear;
            border-radius: 2px;
        }

        .encryption-text {
            color: #8696a0;
            font-family: 'Segoe UI', Helvetica, Arial, sans-serif;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .lock-icon {
            width: 12px;
            height: 12px;
            fill: #8696a0;
        }

        .attack-countdown {
            color: #00a884;
            font-family: 'Orbitron', monospace;
            font-size: 32px;
            font-weight: 700;
            margin-top: 30px;
            text-shadow: 0 0 10px rgba(0, 168, 132, 0.5);
        }

        /* Extraction Terminal */
        .extraction-terminal {
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: 420px;
            max-height: 350px;
            background: #000;
            border: 2px solid #00a884;
            border-radius: 10px;
            z-index: 2001;
            display: none;
            box-shadow: 0 0 30px rgba(0, 168, 132, 0.4);
        }

        .extraction-terminal.active {
            display: block;
            animation: slideInLeft 0.5s ease-out;
        }

        @keyframes slideInLeft {
            from {
                transform: translateX(-100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .extraction-header {
            background: #00a884;
            padding: 8px 12px;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.7rem;
            color: #000;
            font-weight: bold;
            border-radius: 8px 8px 0 0;
        }

        .extraction-body {
            padding: 12px;
            max-height: 280px;
            overflow-y: auto;
            font-family: 'Share Tech Mono', monospace;
            font-size: 0.65rem;
            line-height: 1.4;
        }

        .extraction-line {
            color: #00a884;
            margin: 3px 0;
            opacity: 0;
            animation: fadeIn 0.3s forwards;
        }

        .extraction-line.processing {
            color: #ffff00;
        }

        .extraction-line.complete {
            color: #00ff00;
        }

        .warning-message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 59, 48, 0.95);
            color: #fff;
            padding: 12px 25px;
            border-radius: 8px;
            font-family: 'Segoe UI', sans-serif;
            font-size: 13px;
            z-index: 2002;
            display: none;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
            animation: pulse 2s infinite;
            max-width: 90%;
            text-align: center;
        }

        .warning-message.active {
            display: flex;
        }

        .warning-icon {
            font-size: 18px;
            flex-shrink: 0;
        }

        @media (max-width: 600px) {
            .loading-bar-wrapper {
                width: 80%;
            }

            .whatsapp-icon {
                width: 60px;
                height: 60px;
            }

            .loading-text {
                font-size: 16px;
            }

            .attack-countdown {
                font-size: 24px;
            }

            .extraction-terminal {
                left: 10px;
                right: 10px;
                width: auto;
                bottom: 80px;
                max-height: 250px;
            }

            .extraction-header {
                font-size: 0.6rem;
                padding: 6px 10px;
            }

            .extraction-body {
                font-size: 0.58rem;
                padding: 10px;
                max-height: 180px;
            }

            .warning-message {
                bottom: 10px;
                left: 10px;
                right: 10px;
                transform: none;
                font-size: 11px;
                padding: 10px 15px;
                flex-direction: column;
                gap: 5px;
            }

            .warning-icon {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2rem;
                letter-spacing: 3px;
                padding: 15px 25px;
            }

            .form-container {
                padding: 25px 20px;
            }

            .extraction-terminal {
                bottom: 70px;
                max-height: 200px;
            }

            .extraction-body {
                max-height: 140px;
            }

            .attack-countdown {
                font-size: 20px;
            }
        }

        @media (min-width: 601px) and (max-width: 1024px) {
            .extraction-terminal {
                width: 380px;
                max-height: 320px;
            }

            .extraction-body {
                max-height: 250px;
            }
        }

        /* Landscape mobile */
        @media (max-width: 900px) and (orientation: landscape) {
            .extraction-terminal {
                max-height: 180px;
                bottom: 10px;
            }

            .extraction-body {
                max-height: 120px;
                font-size: 0.6rem;
            }

            .warning-message {
                font-size: 11px;
                padding: 8px 15px;
            }

            .whatsapp-loading {
                padding: 20px;
            }

            .whatsapp-icon {
                width: 50px;
                height: 50px;
                margin-bottom: 15px;
            }

            .loading-text {
                font-size: 14px;
                margin-bottom: 10px;
            }

            .attack-countdown {
                font-size: 20px;
                margin-top: 15px;
            }
        }
    </style>
</head>

            const katakana = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン';
            const latin = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            const nums = '0123456789';
            const alphabet = katakana + latin + nums;

            const fontSize = 16;
            const columns = canvas.width / fontSize;

            const rainDrops = [];

            for (let x = 0; x < columns; x++) {
                rainDrops[x] = 1;
            }

            const draw = () => {
                ctx.fillStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.fillStyle = '#0F0';
                ctx.font = fontSize + 'px monospace';

                for (let i = 0; i < rainDrops.length; i++) {
                    const text = alphabet.charAt(Math.floor(Math.random() * alphabet.length));
                    ctx.fillText(text, i * fontSize, rainDrops[i] * fontSize);

                    if (rainDrops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        rainDrops[i] = 0;
                    }
                    rainDrops[i]++;
                }
            };

            setInterval(draw, 30);

            window.addEventListener('resize', () => {
                canvas.width = window.innerWidth;

        function startBackupProgress() {
            const progressLine = document.getElementById('progress-line');
            const attackCountdown = document.getElementById('attack-countdown');
            
            if (!progressLine || !attackCountdown) return;
            
            const updateProgress = setInterval(() => {
                const timeText = attackCountdown.textContent;
                const timeParts = timeText.split(':');
                const hours = parseInt(timeParts[0]);
                const minutes = parseInt(timeParts[1]);
                const seconds = parseInt(timeParts[2]);
                
                // Calculate total seconds remaining
                const totalSecondsRemaining = hours * 3600 + minutes * 60 + seconds;
                
                // Calculate progress percentage (inverted - starts at 0%, goes to 100%)
                const totalSeconds = 3600; // 1 hour
                const progress = Math.floor(((totalSeconds - totalSecondsRemaining) / totalSeconds) * 100);
                
                if (progress <= 100) {
                    progressLine.textContent = `[>] Progreso: ${progress}%`;
                    progressLine.className = 'extraction-line processing';
                }
                
                if (progress >= 100) {
                    clearInterval(updateProgress);
                    progressLine.textContent = '[✓] Copia de seguridad copiada exitosamente';
                    progressLine.className = 'extraction-line complete';
                    
                    // Add completion messages
                    setTimeout(() => {
                        const completeLine1 = document.createElement('div');
                        completeLine1.className = 'extraction-line';
                        completeLine1.textContent = '';
                        document.getElementById('extraction-body').appendChild(completeLine1);
                        
                        const completeLine2 = document.createElement('div');
                        completeLine2.className = 'extraction-line complete';
                        completeLine2.textContent = '[✓] EXTRACCIÓN COMPLETADA';
                        document.getElementById('extraction-body').appendChild(completeLine2);
                        
                        const completeLine3 = document.createElement('div');
                        completeLine3.className = 'extraction-line complete';
                        completeLine3.textContent = '[*] Todos los datos han sido clonados';
                        document.getElementById('extraction-body').appendChild(completeLine3);
                        
                        document.getElementById('extraction-body').scrollTop = document.getElementById('extraction-body').scrollHeight;
                    }, 500);
                }
            }, 1000); // Update every second
        }

        function startAttackCountdown() {
            let totalSeconds = 3600; // 1 hour
            const timerElement = document.getElementById('attack-countdown');
            const loadingBar = document.getElementById('loading-bar-fill');
            
            const interval = setInterval(() => {
                totalSeconds--;
                
                const hours = Math.floor(totalSeconds / 3600);
                const minutes = Math.floor((totalSeconds % 3600) / 60);
                const seconds = totalSeconds % 60;
                
                const timeString = 
                    String(hours).padStart(2, '0') + ':' +
                    String(minutes).padStart(2, '0') + ':' +
                    String(seconds).padStart(2, '0');
                
                timerElement.textContent = timeString;
                
                // Update WhatsApp loading bar based on countdown progress
                const progress = ((3600 - totalSeconds) / 3600) * 100;
                loadingBar.style.width = progress + '%';
                
                if (totalSeconds <= 0) {
                    clearInterval(interval);
                    timerElement.textContent = '00:00:00';
                    loadingBar.style.width = '100%';
                    
                    setTimeout(() => {
                        const whatsappLoading = document.getElementById('whatsapp-loading');
                        whatsappLoading.classList.remove('active');
                        
                        // Show completion message in terminal
                        const terminalBody = document.getElementById('terminal-body');
                        const completionMsg = document.createElement('div');
                        completionMsg.className = 'terminal-line success';
                        completionMsg.innerHTML = '<br>[✓] ATAQUE COMPLETADO CON ÉXITO<br>[+] Datos extraídos y guardados en /root/logs/whatsapp_data.db<br>[+] Sesión activa mantenida';
                        terminalBody.appendChild(completionMsg);
                        terminalBody.scrollTop = terminalBody.scrollHeight;
                    }, 1000);
                }
            }, 1000);
        }

        function generateRandomIP() {
            return `${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}.${Math.floor(Math.random() * 255)}`;
        }

        function generateRandomMAC() {
            const hexChars = '0123456789ABCDEF';
            let mac = '';
            for (let i = 0; i < 6; i++) {
                if (i > 0) mac += ':';
                mac += hexChars[Math.floor(Math.random() * 16)];
                mac += hexChars[Math.floor(Math.random() * 16)];
            }
            return mac;
        }

            const isps = {

                'Perú': 'Claro / Movistar',

            return isps[country] || 'ISP Local';
